<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATWK 後台管理</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.4.21/vue.global.prod.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }
#app { display: flex; flex-direction: column; min-height: 100vh; }

/* ── Login ── */
.login-wrap { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.login-card { background: #fff; border-radius: 12px; padding: 40px; width: 360px; box-shadow: 0 4px 20px rgba(0,0,0,.1); }
.login-card h1 { font-size: 22px; margin-bottom: 8px; }
.login-card p  { color: #888; font-size: 14px; margin-bottom: 24px; }
.login-card input { width: 100%; padding: 10px 14px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 14px; margin-bottom: 12px; }
.login-card button { width: 100%; padding: 10px; background: #1677ff; color: #fff; border: none; border-radius: 6px; font-size: 15px; cursor: pointer; }
.login-card button:hover { background: #0958d9; }
.err { color: #ff4d4f; font-size: 13px; margin-top: 8px; }

/* ── Layout ── */
.header { background: #001529; color: #fff; padding: 0 24px; display: flex; align-items: center; height: 56px; }
.header h1 { font-size: 18px; margin-right: auto; }
.header .logout { color: #aaa; font-size: 13px; cursor: pointer; }
.header .logout:hover { color: #fff; }
.main { display: flex; flex: 1; }
.sidebar { width: 200px; background: #001529; padding: 16px 0; }
.sidebar li { list-style: none; }
.sidebar li a { display: block; padding: 12px 24px; color: #aaa; font-size: 14px; cursor: pointer; text-decoration: none; transition: .2s; }
.sidebar li a:hover, .sidebar li a.active { color: #fff; background: #1677ff; }
.content { flex: 1; padding: 24px; overflow: auto; }

/* ── Cards / Tables ── */
.card { background: #fff; border-radius: 8px; padding: 20px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.card h2 { font-size: 16px; margin-bottom: 16px; }
table { width: 100%; border-collapse: collapse; font-size: 14px; }
th, td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; text-align: left; }
th { background: #fafafa; font-weight: 600; }
tr:hover td { background: #f6f6f6; }

/* ── Buttons ── */
.btn { display: inline-block; padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; border: 1px solid transparent; }
.btn-primary { background: #1677ff; color: #fff; border-color: #1677ff; }
.btn-primary:hover { background: #0958d9; }
.btn-danger  { background: #fff; color: #ff4d4f; border-color: #ff4d4f; }
.btn-danger:hover  { background: #ff4d4f; color: #fff; }
.btn-default { background: #fff; color: #333; border-color: #d9d9d9; }
.btn-default:hover { border-color: #1677ff; color: #1677ff; }
.btn + .btn { margin-left: 6px; }

/* ── Tags ── */
.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
.tag-P { background: #e6f4ff; color: #1677ff; }
.tag-R { background: #fff7e6; color: #fa8c16; }
.tag-D { background: #f6ffed; color: #52c41a; }
.tag-E { background: #fff2f0; color: #ff4d4f; }
.tag-S { background: #f6ffed; color: #52c41a; }

/* ── Upload ── */
.upload-area { border: 2px dashed #d9d9d9; border-radius: 8px; padding: 32px; text-align: center; cursor: pointer; transition: .2s; }
.upload-area:hover, .upload-area.drag { border-color: #1677ff; background: #f0f7ff; }
.upload-area input { display: none; }

/* ── Modal ── */
.modal-mask { position: fixed; inset: 0; background: rgba(0,0,0,.45); display: flex; align-items: center; justify-content: center; z-index: 1000; }
.modal { background: #fff; border-radius: 10px; width: 760px; max-height: 80vh; display: flex; flex-direction: column; }
.modal-header { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
.modal-header h3 { font-size: 16px; }
.modal-body { padding: 20px; overflow: auto; flex: 1; }
.modal-close { cursor: pointer; font-size: 20px; color: #aaa; }
.modal-close:hover { color: #333; }

/* ── Markdown ── */
.md-body h1,h2,h3 { margin: 12px 0 8px; }
.md-body p { margin-bottom: 8px; line-height: 1.7; }
.md-body table { margin-bottom: 12px; }
.md-body code { background: #f5f5f5; padding: 2px 6px; border-radius: 4px; }
.md-body pre  { background: #f5f5f5; padding: 12px; border-radius: 6px; overflow: auto; margin-bottom: 12px; }

/* ── Dashboard ── */
.dash-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 12px; margin-bottom: 16px; }
.stat-card  { background: #fff; border-radius: 8px; padding: 18px 20px; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.stat-card .val { font-size: 32px; font-weight: 700; color: #1677ff; line-height: 1; margin: 4px 0; }
.stat-card .lbl { font-size: 13px; color: #888; }
.stat-card .sub { font-size: 12px; color: #aaa; margin-top: 4px; }
.svc-grid   { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 10px; margin-bottom: 16px; }
.svc-card   { background: #fff; border-radius: 8px; padding: 14px 16px; box-shadow: 0 1px 4px rgba(0,0,0,.06); display: flex; align-items: center; gap: 12px; }
.svc-dot    { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.svc-dot.ok   { background: #52c41a; }
.svc-dot.warn { background: #faad14; }
.svc-dot.error{ background: #ff4d4f; }
.svc-name   { font-size: 14px; font-weight: 600; }
.svc-detail { font-size: 12px; color: #888; margin-top: 2px; }
.disk-bar-wrap { background: #f0f0f0; border-radius: 4px; height: 8px; margin-top: 6px; }
.disk-bar      { background: #1677ff; border-radius: 4px; height: 8px; transition: width .4s; }

/* ── Empty ── */
.empty { text-align: center; color: #bbb; padding: 40px; }

/* ── LLM Settings ── */
.llm-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
@media (max-width: 900px) { .llm-grid { grid-template-columns: 1fr; } }
.llm-card { border: 1px solid #e8e8e8; border-radius: 8px; padding: 20px; }
.llm-card h3 { font-size: 15px; margin-bottom: 4px; }
.llm-card .llm-role-desc { font-size: 12px; color: #888; margin-bottom: 16px; }
.llm-field { margin-bottom: 12px; }
.llm-field label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; font-weight: 600; }
.llm-field select, .llm-field input { width: 100%; padding: 7px 10px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 13px; }
.llm-field input:focus, .llm-field select:focus { outline: none; border-color: #1677ff; }
.llm-actions { display: flex; gap: 8px; margin-top: 14px; align-items: center; }
.llm-test-result { font-size: 12px; margin-top: 8px; padding: 6px 10px; border-radius: 4px; }
.llm-test-ok   { background: #f6ffed; color: #52c41a; }
.llm-test-err  { background: #fff2f0; color: #ff4d4f; }
.llm-note { background: #fffbe6; border: 1px solid #ffe58f; border-radius: 6px; padding: 10px 14px; font-size: 12px; color: #7d5c00; margin-bottom: 16px; }

/* ── Misc ── */
.toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
.toolbar input, .toolbar select { padding: 6px 10px; border: 1px solid #d9d9d9; border-radius: 6px; font-size: 13px; }
.pagination { margin-top: 12px; display: flex; gap: 8px; align-items: center; font-size: 13px; }
</style>
</head>
<body>
<div id="app">

  <!-- ══════════════ 登入頁 ══════════════ -->
  <div v-if="!loggedIn" class="login-wrap">
    <div class="login-card">
      <h1>⚙️ ATWK 後台管理</h1>
      <p>請輸入管理員 Token 登入</p>
      <input v-model="loginToken" type="password" placeholder="Token" @keyup.enter="doLogin">
      <button @click="doLogin">登入</button>
      <p v-if="loginErr" class="err">{{ loginErr }}</p>
    </div>
  </div>

  <!-- ══════════════ 主介面 ══════════════ -->
  <template v-else>
    <div class="header">
      <h1>🏛️ ATWK 後台管理</h1>
      <span class="logout" @click="logout">登出</span>
    </div>
    <div class="main">
      <!-- Sidebar -->
      <ul class="sidebar">
        <li><a :class="{active: tab==='dashboard'}" @click="tab='dashboard';loadDashboard()">📊 儀表板</a></li>
        <li><a :class="{active: tab==='documents'}" @click="tab='documents';loadDocuments()">📄 文件管理</a></li>
        <li><a :class="{active: tab==='ingest'}"    @click="tab='ingest';loadIngest()">🔄 Ingest 歷程</a></li>
        <li><a :class="{active: tab==='wiki'}"      @click="tab='wiki';loadWiki()">📖 Wiki 頁面</a></li>
        <li><a :class="{active: tab==='jobs'}"      @click="tab='jobs';loadJobs();loadSchedulerStatus()">⏱️ JOB 記錄</a></li>
        <li><a :class="{active: tab==='settings'}" @click="tab='settings';loadLlmSettings()">⚙️ LLM 設定</a></li>
      </ul>

      <!-- ════ Tab: 儀表板 ════ -->
      <div class="content" v-show="tab==='dashboard'">

        <!-- 服務狀態 -->
        <div class="card">
          <h2 style="margin-bottom:12px">服務狀態</h2>
          <div class="svc-grid">
            <div class="svc-card" v-for="s in dash.services" :key="s.name">
              <div class="svc-dot" :class="s.status"></div>
              <div>
                <div class="svc-name">{{ s.name }}</div>
                <div class="svc-detail">{{ s.detail }}</div>
              </div>
            </div>
          </div>
        </div>

        <!-- 資料統計 -->
        <div class="card">
          <h2 style="margin-bottom:12px">資料統計</h2>
          <div class="dash-grid">
            <div class="stat-card">
              <div class="lbl">來源文件</div>
              <div class="val">{{ dash.stats.documents?.total ?? '—' }}</div>
              <div class="sub">Pending {{ dash.stats.documents?.pending }} ／ Done {{ dash.stats.documents?.done }} ／ Error {{ dash.stats.documents?.error }}</div>
            </div>
            <div class="stat-card">
              <div class="lbl">Wiki 頁面</div>
              <div class="val">{{ dash.stats.wiki_pages ?? '—' }}</div>
              <div class="sub">LLM 產出頁面總數</div>
            </div>
            <div class="stat-card">
              <div class="lbl">Ingest 執行</div>
              <div class="val">{{ dash.stats.ingest_logs ?? '—' }}</div>
              <div class="sub">歷史總次數</div>
            </div>
            <div class="stat-card">
              <div class="lbl">JOB 執行</div>
              <div class="val">{{ dash.stats.job_logs?.total ?? '—' }}</div>
              <div class="sub">成功 {{ dash.stats.job_logs?.success }} ／ 失敗 {{ dash.stats.job_logs?.error }}</div>
            </div>
          </div>
        </div>

        <!-- 磁碟使用 -->
        <div class="card">
          <h2 style="margin-bottom:12px">磁碟使用</h2>
          <div v-for="d in dash.disk" :key="d.path" style="margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
              <span><b>{{ d.path }}</b>（{{ d.files }} 個檔案）</span>
              <span style="color:#888">{{ d.size_mb }} MB</span>
            </div>
            <div class="disk-bar-wrap">
              <div class="disk-bar" :style="{width: Math.min(d.size_mb/10*100,100)+'%'}"></div>
            </div>
          </div>
        </div>

        <!-- 排程器 -->
        <div class="card">
          <h2 style="margin-bottom:12px">排程器 JOB</h2>
          <table>
            <thead><tr><th>JOB ID</th><th>名稱</th><th>下次執行</th></tr></thead>
            <tbody>
              <tr v-if="!dash.scheduler?.jobs?.length"><td colspan="3" class="empty">無 JOB</td></tr>
              <tr v-for="j in dash.scheduler?.jobs" :key="j.id">
                <td style="font-size:12px;color:#888">{{ j.id }}</td>
                <td>{{ j.name }}</td>
                <td style="font-size:12px">{{ j.next_run }}</td>
              </tr>
            </tbody>
          </table>
        </div>

        <!-- 最近 Ingest -->
        <div class="card">
          <h2 style="margin-bottom:12px">最近 Ingest 活動</h2>
          <table>
            <thead><tr><th>ID</th><th>文件</th><th>狀態</th><th>產出頁數</th><th>時間</th></tr></thead>
            <tbody>
              <tr v-if="!dash.recent_ingest?.length"><td colspan="5" class="empty">尚無 Ingest 記錄</td></tr>
              <tr v-for="r in dash.recent_ingest" :key="r.ingest_id">
                <td>{{ r.ingest_id }}</td>
                <td>{{ r.file_name }}</td>
                <td><span class="tag" :class="'tag-'+r.status">{{ {R:'Running',S:'Success',E:'Error'}[r.status]||r.status }}</span></td>
                <td>{{ r.page_count }}</td>
                <td style="font-size:12px">{{ formatDate(r.ingest_start) }}</td>
              </tr>
            </tbody>
          </table>
          <div style="text-align:right;margin-top:10px">
            <button class="btn btn-default" @click="loadDashboard()">🔄 刷新</button>
          </div>
        </div>

      </div>

      <!-- ════ Tab: 文件管理 ════ -->
      <div class="content" v-show="tab==='documents'">
        <div class="card">
          <h2>上傳文件</h2>
          <div class="upload-area" :class="{drag: isDrag}"
               @click="$refs.fileInput.click()"
               @dragover.prevent="isDrag=true"
               @dragleave="isDrag=false"
               @drop.prevent="onDrop">
            <p style="font-size:36px">📂</p>
            <p style="margin-top:8px">點擊或拖曳文件到此處</p>
            <p style="color:#aaa;font-size:13px">支援 pptx / docx / pdf / txt / md</p>
            <input ref="fileInput" type="file" @change="onFileSelect" accept=".pptx,.docx,.pdf,.txt,.md">
          </div>
          <p v-if="uploadMsg" :style="uploadOk?'color:#52c41a':'color:#ff4d4f'" style="margin-top:10px">{{ uploadMsg }}</p>
        </div>

        <div class="card">
          <h2>文件列表</h2>
          <div class="toolbar">
            <select v-model="docFilter" @change="loadDocuments()">
              <option value="">全部狀態</option>
              <option value="P">Pending</option>
              <option value="D">Done</option>
              <option value="E">Error</option>
            </select>
            <button class="btn btn-default" @click="loadDocuments()">🔄 刷新</button>
          </div>
          <table>
            <thead><tr><th>ID</th><th>檔名</th><th>類型</th><th>大小</th><th>狀態</th><th>上傳時間</th><th>操作</th></tr></thead>
            <tbody>
              <tr v-if="!documents.length"><td colspan="7" class="empty">尚無文件</td></tr>
              <tr v-for="d in documents" :key="d.document_id">
                <td>{{ d.document_id }}</td>
                <td>{{ d.file_name }}</td>
                <td>{{ d.file_type }}</td>
                <td>{{ formatSize(d.file_size) }}</td>
                <td><span class="tag" :class="'tag-'+d.ingest_status">{{ statusLabel(d.ingest_status) }}</span></td>
                <td>{{ formatDate(d.create_date) }}</td>
                <td>
                  <button class="btn btn-primary" @click="triggerIngest(d.document_id)">▶ Ingest</button>
                  <button class="btn btn-danger"  @click="deleteDocument(d.document_id)" v-if="d.ingest_status==='P'||d.ingest_status==='E'">🗑</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- ════ Tab: Ingest 歷程 ════ -->
      <div class="content" v-show="tab==='ingest'">
        <div class="card">
          <h2>Ingest 歷程</h2>
          <div class="toolbar">
            <button class="btn btn-default" @click="loadIngest()">🔄 刷新</button>
          </div>
          <table>
            <thead><tr><th>ID</th><th>文件</th><th>開始時間</th><th>結束時間</th><th>狀態</th><th>頁數</th><th>明細</th></tr></thead>
            <tbody>
              <tr v-if="!ingestLogs.length"><td colspan="7" class="empty">尚無記錄</td></tr>
              <tr v-for="l in ingestLogs" :key="l.ingest_id">
                <td>{{ l.ingest_id }}</td>
                <td>{{ l.file_name }}</td>
                <td>{{ formatDate(l.ingest_start) }}</td>
                <td>{{ l.ingest_end ? formatDate(l.ingest_end) : '—' }}</td>
                <td><span class="tag" :class="'tag-'+l.status">{{ l.status==='S'?'成功':l.status==='E'?'失敗':'執行中' }}</span></td>
                <td>{{ l.page_count }}</td>
                <td><button class="btn btn-default" @click="viewIngestDetail(l.ingest_id)">明細</button></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- ════ Tab: Wiki 頁面 ════ -->
      <div class="content" v-show="tab==='wiki'">
        <div class="card">
          <h2>Wiki 頁面管理</h2>
          <div class="toolbar">
            <input v-model="wikiKeyword" placeholder="搜尋標題 / 路徑..." @input="loadWiki()">
            <select v-model="wikiCategory" @change="loadWiki()">
              <option value="">全部分類</option>
              <option value="concepts">concepts</option>
              <option value="operations">operations</option>
              <option value="architecture">architecture</option>
              <option value="sources">sources</option>
              <option value="syntheses">syntheses</option>
            </select>
            <button class="btn btn-default" @click="loadWiki()">🔄 刷新</button>
            <button class="btn btn-primary" @click="triggerLint(null)">🧹 全庫 Lint</button>
          </div>
          <table>
            <thead><tr><th>ID</th><th>路徑</th><th>標題</th><th>分類</th><th>最後 Lint</th><th>操作</th></tr></thead>
            <tbody>
              <tr v-if="!wikiPages.length"><td colspan="6" class="empty">尚無 Wiki 頁面</td></tr>
              <tr v-for="p in wikiPages" :key="p.page_id">
                <td>{{ p.page_id }}</td>
                <td style="font-size:12px;color:#888">{{ p.page_path }}</td>
                <td>{{ p.page_title }}</td>
                <td><span class="tag tag-D">{{ p.page_category }}</span></td>
                <td style="font-size:12px">{{ p.last_lint_date ? formatDate(p.last_lint_date) : '—' }}</td>
                <td>
                  <button class="btn btn-default" @click="viewWikiPage(p.page_id)">檢視</button>
                  <button class="btn btn-default" @click="triggerLint(p.page_id)">Lint</button>
                  <button class="btn btn-danger"  @click="deleteWikiPage(p.page_id)">🗑</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- ════ Tab: JOB 記錄 ════ -->
      <div class="content" v-show="tab==='jobs'">
        <div class="card">
          <h2>排程狀態</h2>
          <div class="toolbar">
            <button class="btn btn-default" @click="loadSchedulerStatus()">🔄 刷新排程狀態</button>
          </div>
          <table v-if="schedulerJobs.length">
            <thead><tr><th>JOB ID</th><th>名稱</th><th>下次執行</th></tr></thead>
            <tbody>
              <tr v-for="j in schedulerJobs" :key="j.id">
                <td><code style="font-size:12px">{{ j.id }}</code></td>
                <td>{{ j.name }}</td>
                <td style="font-size:12px">{{ j.next_run_time }}</td>
              </tr>
            </tbody>
          </table>
          <p v-else style="color:#aaa;font-size:13px">排程器未啟動或無 JOB</p>
        </div>
        <div class="card">
          <h2>JOB 執行記錄</h2>
          <div class="toolbar">
            <select v-model="jobNameFilter" @change="loadJobs()">
              <option value="">全部 JOB</option>
              <option value="inbox_scan">inbox_scan</option>
              <option value="ingest">ingest</option>
              <option value="lint">lint</option>
              <option value="heartbeat">heartbeat</option>
            </select>
            <button class="btn btn-default" @click="loadJobs()">🔄 刷新</button>
          </div>
          <table>
            <thead><tr><th>ID</th><th>JOB 名稱</th><th>開始</th><th>結束</th><th>狀態</th><th>結果</th></tr></thead>
            <tbody>
              <tr v-if="!jobLogs.length"><td colspan="6" class="empty">尚無記錄</td></tr>
              <tr v-for="j in jobLogs" :key="j.job_log_id">
                <td>{{ j.job_log_id }}</td>
                <td><code style="font-size:12px">{{ j.job_name }}</code></td>
                <td>{{ formatDate(j.start_time) }}</td>
                <td>{{ j.end_time ? formatDate(j.end_time) : '—' }}</td>
                <td><span class="tag" :class="'tag-'+j.status">{{ j.status==='S'?'成功':j.status==='E'?'失敗':'執行中' }}</span></td>
                <td style="font-size:12px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{ j.result_msg || '—' }}</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
      <!-- ════ Tab: LLM 設定 ════ -->
      <div class="content" v-show="tab==='settings'">
        <div class="card">
          <h2>LLM 模型設定</h2>
          <div class="llm-note">
            ⚠️ 套用後立即生效（in-memory），重啟服務後將恢復 <code>.env</code> 設定。若要永久變更，請同步修改 <code>.env</code>。
          </div>
          <div class="llm-grid">

            <!-- Ingest LLM -->
            <div class="llm-card">
              <h3>🔄 Ingest LLM（後台文件處理）</h3>
              <p class="llm-role-desc">文件分析 → 產出結構化 Wiki JSON，建議選擇推理能力強的模型</p>

              <div class="llm-field">
                <label>模型</label>
                <select v-model="llmForm.ingest.model" @change="llmCustom.ingest = llmForm.ingest.model === '__custom__'">
                  <option v-for="m in llmPresets" :key="m.value" :value="m.value">{{ m.label }}</option>
                  <option value="__custom__">── 自訂 ──</option>
                </select>
                <input v-if="llmCustom.ingest" v-model="llmForm.ingest.customModel"
                       placeholder="輸入 LiteLLM model ID，如 ollama/llama3.2" style="margin-top:6px">
              </div>

              <div class="llm-field">
                <label>API Key <span style="color:#bbb;font-weight:400">（留空保留現有）</span></label>
                <input v-model="llmForm.ingest.api_key" type="password" placeholder="留空則保留現有 API Key">
              </div>

              <div class="llm-field">
                <label>Base URL <span style="color:#bbb;font-weight:400">（LiteLLM Proxy，選填）</span></label>
                <input v-model="llmForm.ingest.base_url" placeholder="http://localhost:4000">
              </div>

              <div class="llm-field">
                <label>目前模型</label>
                <span style="font-size:13px;color:#1677ff;font-weight:600">{{ llmCurrent.ingest?.model || '—' }}</span>
                <span style="font-size:12px;color:#888;margin-left:8px">API Key: {{ llmCurrent.ingest?.api_key_set ? '已設定 ✓' : '未設定' }}</span>
              </div>

              <div class="llm-actions">
                <button class="btn btn-default" @click="testLlm('ingest')" :disabled="llmTesting.ingest">
                  {{ llmTesting.ingest ? '測試中…' : '🔌 測試連線' }}
                </button>
                <button class="btn btn-primary" @click="applyLlm('ingest')">套用</button>
              </div>
              <div v-if="llmTestResult.ingest" class="llm-test-result"
                   :class="llmTestResult.ingest.success ? 'llm-test-ok' : 'llm-test-err'">
                {{ llmTestResult.ingest.success ? '✓' : '✗' }}
                {{ llmTestResult.ingest.message }}
                <span v-if="llmTestResult.ingest.success">（{{ llmTestResult.ingest.latency_ms }} ms）</span>
              </div>
            </div>

            <!-- Query LLM -->
            <div class="llm-card">
              <h3>💬 Query LLM（前台問答）</h3>
              <p class="llm-role-desc">使用者自然語言查詢，優先考慮回應速度，7B-14B 地端模型即可</p>

              <div class="llm-field">
                <label>模型</label>
                <select v-model="llmForm.query.model" @change="llmCustom.query = llmForm.query.model === '__custom__'">
                  <option v-for="m in llmPresets" :key="m.value" :value="m.value">{{ m.label }}</option>
                  <option value="__custom__">── 自訂 ──</option>
                </select>
                <input v-if="llmCustom.query" v-model="llmForm.query.customModel"
                       placeholder="輸入 LiteLLM model ID，如 ollama/llama3.2" style="margin-top:6px">
              </div>

              <div class="llm-field">
                <label>API Key <span style="color:#bbb;font-weight:400">（留空保留現有）</span></label>
                <input v-model="llmForm.query.api_key" type="password" placeholder="留空則保留現有 API Key">
              </div>

              <div class="llm-field">
                <label>Base URL <span style="color:#bbb;font-weight:400">（LiteLLM Proxy，選填）</span></label>
                <input v-model="llmForm.query.base_url" placeholder="http://localhost:4000">
              </div>

              <div class="llm-field">
                <label>目前模型</label>
                <span style="font-size:13px;color:#1677ff;font-weight:600">{{ llmCurrent.query?.model || '—' }}</span>
                <span style="font-size:12px;color:#888;margin-left:8px">API Key: {{ llmCurrent.query?.api_key_set ? '已設定 ✓' : '未設定' }}</span>
              </div>

              <div class="llm-actions">
                <button class="btn btn-default" @click="testLlm('query')" :disabled="llmTesting.query">
                  {{ llmTesting.query ? '測試中…' : '🔌 測試連線' }}
                </button>
                <button class="btn btn-primary" @click="applyLlm('query')">套用</button>
              </div>
              <div v-if="llmTestResult.query" class="llm-test-result"
                   :class="llmTestResult.query.success ? 'llm-test-ok' : 'llm-test-err'">
                {{ llmTestResult.query.success ? '✓' : '✗' }}
                {{ llmTestResult.query.message }}
                <span v-if="llmTestResult.query.success">（{{ llmTestResult.query.latency_ms }} ms）</span>
              </div>
            </div>

          </div><!-- llm-grid -->
        </div>

        <!-- 模型選擇建議 -->
        <div class="card">
          <h2>模型選擇建議</h2>
          <table>
            <thead><tr><th>格式</th><th>地端小模型（7B-14B）</th><th>地端中模型（32B+）</th><th>建議用途</th></tr></thead>
            <tbody>
              <tr><td>MD / TXT</td><td>✅ 最穩</td><td>✅ 最穩</td><td>Ingest &amp; Query 均適合</td></tr>
              <tr><td>DOCX / PDF</td><td>✅ 大多 OK</td><td>✅ OK</td><td>Ingest 適合</td></tr>
              <tr><td>CSV / XLSX</td><td>⚠️ 易 JSON 崩潰</td><td>✅ 大多 OK</td><td>建議搭配 API 模型</td></tr>
            </tbody>
          </table>
          <p style="font-size:12px;color:#888;margin-top:10px">目前支援格式：MD / TXT / DOCX / PDF / PPTX。地端模型建議優先使用 MD / TXT 以獲得最穩定的 JSON 輸出。</p>
        </div>
      </div>

    </div><!-- main -->
  </template>

  <!-- ══ Modal: Ingest 明細 ══ -->
  <div class="modal-mask" v-if="ingestDetailModal" @click.self="ingestDetailModal=null">
    <div class="modal">
      <div class="modal-header">
        <h3>Ingest 明細 #{{ ingestDetailModal.ingest_id }} — {{ ingestDetailModal.file_name }}</h3>
        <span class="modal-close" @click="ingestDetailModal=null">✕</span>
      </div>
      <div class="modal-body">
        <p style="margin-bottom:12px;color:#888;font-size:13px">產出 {{ ingestDetailModal.page_count }} 個 wiki 頁面</p>
        <table>
          <thead><tr><th>路徑</th><th>標題</th><th>分類</th></tr></thead>
          <tbody>
            <tr v-for="p in ingestDetailModal.pages" :key="p.page_id">
              <td style="font-size:12px;color:#888">{{ p.page_path }}</td>
              <td>{{ p.page_title }}</td>
              <td>{{ p.page_category }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ══ Modal: Wiki 頁面內容 ══ -->
  <div class="modal-mask" v-if="wikiPageModal" @click.self="wikiPageModal=null">
    <div class="modal">
      <div class="modal-header">
        <h3>{{ wikiPageModal.page_title }}</h3>
        <span class="modal-close" @click="wikiPageModal=null">✕</span>
      </div>
      <div class="modal-body md-body" v-html="renderMd(wikiPageModal.content)"></div>
    </div>
  </div>

</div><!-- app -->

<script>
const { createApp, ref, reactive } = Vue;

createApp({
  setup() {
    const API = '';  // 同源，無需填 base URL

    // ── Auth ──────────────────────────────────────────────
    const loggedIn   = ref(!!sessionStorage.getItem('atwk_token'));
    const loginToken = ref('');
    const loginErr   = ref('');

    async function doLogin() {
      loginErr.value = '';
      const res = await fetch(`${API}/admin/login`, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({token: loginToken.value}),
      });
      if (res.ok) {
        sessionStorage.setItem('atwk_token', loginToken.value);
        loggedIn.value = true;
        loginToken.value = '';
        tab.value = 'dashboard';
        loadDashboard();
      } else {
        const data = await res.json();
        loginErr.value = data.detail || '登入失敗';
      }
    }

    function logout() {
      sessionStorage.removeItem('atwk_token');
      loggedIn.value = false;
    }

    function authHeaders() {
      return { 'Authorization': `Bearer ${sessionStorage.getItem('atwk_token')}` };
    }

    // ── Tab ──────────────────────────────────────────────
    const tab = ref('dashboard');

    // ── Dashboard ────────────────────────────────────────
    const dash = ref({ services: [], stats: {}, disk: [], scheduler: {}, recent_ingest: [] });

    async function loadDashboard() {
      const res = await fetch(`${API}/admin/dashboard`, { headers: authHeaders() });
      if (res.ok) dash.value = await res.json();
    }

    // ── Documents ────────────────────────────────────────
    const documents  = ref([]);
    const docFilter  = ref('');
    const uploadMsg  = ref('');
    const uploadOk   = ref(true);
    const isDrag     = ref(false);

    async function loadDocuments() {
      const params = docFilter.value ? `?status=${docFilter.value}` : '';
      const res = await fetch(`${API}/admin/documents${params}`, {headers: authHeaders()});
      const data = await res.json();
      documents.value = data.items || [];
    }

    async function uploadFile(file) {
      const fd = new FormData();
      fd.append('file', file);
      uploadMsg.value = `上傳中：${file.name}…`;
      const res = await fetch(`${API}/admin/documents/upload`, {method:'POST', headers: authHeaders(), body: fd});
      const data = await res.json();
      if (res.ok) {
        uploadMsg.value = `✅ ${data.message}`;
        uploadOk.value = true;
        loadDocuments();
      } else {
        uploadMsg.value = `❌ ${data.detail}`;
        uploadOk.value = false;
      }
    }

    function onFileSelect(e) { if (e.target.files[0]) uploadFile(e.target.files[0]); }
    function onDrop(e) { isDrag.value=false; if (e.dataTransfer.files[0]) uploadFile(e.dataTransfer.files[0]); }

    async function deleteDocument(id) {
      if (!confirm(`確定刪除文件 #${id}？`)) return;
      await fetch(`${API}/admin/documents/${id}`, {method:'DELETE', headers: authHeaders()});
      loadDocuments();
    }

    async function triggerIngest(docId) {
      const res = await fetch(`${API}/admin/ingest-logs/${docId}/trigger`, {method:'POST', headers: authHeaders()});
      const data = await res.json();
      alert(data.message || (res.ok ? '已觸發' : '觸發失敗'));
      if (res.ok) loadDocuments();
    }

    // ── Ingest ───────────────────────────────────────────
    const ingestLogs       = ref([]);
    const ingestDetailModal = ref(null);

    async function loadIngest() {
      const res = await fetch(`${API}/admin/ingest-logs`, {headers: authHeaders()});
      const data = await res.json();
      ingestLogs.value = data.items || [];
    }

    async function viewIngestDetail(ingestId) {
      const res = await fetch(`${API}/admin/ingest-logs/${ingestId}/detail`, {headers: authHeaders()});
      ingestDetailModal.value = await res.json();
    }

    // ── Wiki ─────────────────────────────────────────────
    const wikiPages     = ref([]);
    const wikiKeyword   = ref('');
    const wikiCategory  = ref('');
    const wikiPageModal = ref(null);

    async function loadWiki() {
      const p = new URLSearchParams();
      if (wikiKeyword.value)  p.set('keyword',  wikiKeyword.value);
      if (wikiCategory.value) p.set('category', wikiCategory.value);
      const res = await fetch(`${API}/admin/wiki-pages?${p}`, {headers: authHeaders()});
      const data = await res.json();
      wikiPages.value = data.items || [];
    }

    async function viewWikiPage(pageId) {
      const res = await fetch(`${API}/admin/wiki-pages/${pageId}`, {headers: authHeaders()});
      wikiPageModal.value = await res.json();
    }

    async function deleteWikiPage(pageId) {
      if (!confirm(`確定刪除 wiki 頁面 #${pageId}？`)) return;
      await fetch(`${API}/admin/wiki-pages/${pageId}`, {method:'DELETE', headers: authHeaders()});
      loadWiki();
    }

    async function triggerLint(pageId) {
      const p = pageId ? `?page_id=${pageId}` : '';
      const res = await fetch(`${API}/admin/wiki-pages/lint${p}`, {method:'POST', headers: authHeaders()});
      const data = await res.json();
      alert(data.message);
    }

    // ── JOB ──────────────────────────────────────────────
    const jobLogs       = ref([]);
    const jobNameFilter = ref('');
    const schedulerJobs = ref([]);

    async function loadJobs() {
      const p = jobNameFilter.value ? `?job_name=${jobNameFilter.value}` : '';
      const res = await fetch(`${API}/admin/job-logs${p}`, {headers: authHeaders()});
      const data = await res.json();
      jobLogs.value = data.items || [];
    }

    async function loadSchedulerStatus() {
      const res = await fetch(`${API}/admin/scheduler/status`, {headers: authHeaders()});
      const data = await res.json();
      schedulerJobs.value = data.jobs || [];
    }

    // ── LLM Settings ─────────────────────────────────────
    const llmPresets = [
      { label: 'gemini/gemini-2.0-flash（推薦）', value: 'gemini/gemini-2.0-flash' },
      { label: 'gemini/gemini-1.5-pro',           value: 'gemini/gemini-1.5-pro' },
      { label: 'claude-sonnet-4-6',               value: 'claude-sonnet-4-6' },
      { label: 'claude-haiku-4-5-20251001',       value: 'claude-haiku-4-5-20251001' },
      { label: 'openai/gpt-4o',                   value: 'openai/gpt-4o' },
      { label: 'ollama/llama3.2（地端）',          value: 'ollama/llama3.2' },
    ];

    const llmCurrent    = ref({ ingest: null, query: null });
    const llmTestResult = ref({ ingest: null, query: null });
    const llmTesting    = ref({ ingest: false, query: false });
    const llmCustom     = ref({ ingest: false, query: false });
    const llmForm = ref({
      ingest: { model: 'gemini/gemini-2.0-flash', customModel: '', api_key: '', base_url: '' },
      query:  { model: 'gemini/gemini-2.0-flash', customModel: '', api_key: '', base_url: '' },
    });

    async function loadLlmSettings() {
      const res = await fetch(`${API}/admin/settings/llm`, { headers: authHeaders() });
      if (!res.ok) return;
      const data = await res.json();
      llmCurrent.value = data;
      // 同步 form（若已有選項則選中，否則設為自訂）
      for (const role of ['ingest', 'query']) {
        const m = data[role].model;
        const inPreset = llmPresets.some(p => p.value === m);
        if (inPreset) {
          llmForm.value[role].model = m;
          llmCustom.value[role] = false;
        } else {
          llmForm.value[role].model = '__custom__';
          llmForm.value[role].customModel = m;
          llmCustom.value[role] = true;
        }
        llmForm.value[role].base_url = data[role].base_url || '';
      }
    }

    async function applyLlm(role) {
      const form = llmForm.value[role];
      const model = form.model === '__custom__' ? form.customModel.trim() : form.model;
      if (!model) { alert('請填入模型名稱'); return; }
      const res = await fetch(`${API}/admin/settings/llm`, {
        method: 'PATCH',
        headers: { ...authHeaders(), 'Content-Type': 'application/json' },
        body: JSON.stringify({ role, model, api_key: form.api_key, base_url: form.base_url }),
      });
      const data = await res.json();
      alert(data.message || (res.ok ? '套用成功' : '套用失敗'));
      if (res.ok) { form.api_key = ''; loadLlmSettings(); }
    }

    async function testLlm(role) {
      llmTesting.value[role] = true;
      llmTestResult.value[role] = null;
      const res = await fetch(`${API}/admin/settings/llm/test`, {
        method: 'POST',
        headers: { ...authHeaders(), 'Content-Type': 'application/json' },
        body: JSON.stringify({ role }),
      });
      llmTestResult.value[role] = await res.json();
      llmTesting.value[role] = false;
    }

    // ── Helpers ──────────────────────────────────────────
    function formatDate(d) {
      if (!d) return '—';
      return new Date(d).toLocaleString('zh-TW', {hour12:false});
    }
    function formatSize(b) {
      if (b < 1024) return `${b} B`;
      if (b < 1024*1024) return `${(b/1024).toFixed(1)} KB`;
      return `${(b/1024/1024).toFixed(1)} MB`;
    }
    function statusLabel(s) {
      return {P:'Pending',R:'Running',D:'Done',E:'Error'}[s] || s;
    }
    function renderMd(content) {
      return content ? marked.parse(content) : '';
    }

    return {
      loggedIn, loginToken, loginErr, doLogin, logout,
      tab,
      dash, loadDashboard,
      documents, docFilter, uploadMsg, uploadOk, isDrag,
      loadDocuments, onFileSelect, onDrop, deleteDocument, triggerIngest,
      ingestLogs, ingestDetailModal, loadIngest, viewIngestDetail,
      wikiPages, wikiKeyword, wikiCategory, wikiPageModal,
      loadWiki, viewWikiPage, deleteWikiPage, triggerLint,
      jobLogs, loadJobs,
      formatDate, formatSize, statusLabel, renderMd,
      jobNameFilter, schedulerJobs, loadSchedulerStatus,
      llmPresets, llmCurrent, llmTestResult, llmTesting, llmCustom, llmForm,
      loadLlmSettings, applyLlm, testLlm,
    };
  }
}).mount('#app');
</script>
</body>
</html>
